hrtf_version: "1.0"
scenario:
  name: "SC-08: Slope Ascent — 10 Degrees"
  description: "Robot walks 5m up a 10-degree incline without fall; completes within 15s"
  robot:
    model: "../models/simple_biped.urdf"
  simulator:
    backend: "mujoco"
    seed: 42
    step_size: 0.002
    real_time_factor: 0.0
  initial_conditions:
    pose:
      position: [0.0, 0.0, 1.0]
      orientation: [0.0, 0.0, 0.0, 1.0]
  disturbance: []
  duration: 15.0
  assertions:
    - type: "always_above"
      signal: "/com_height"
      value: 0.05
      window: [0.0, 15.0]
    - type: "never_exceeds"
      signal: "/com_height"
      value: 5.0
      window: [0.0, 15.0]
  metadata:
    author: "hrtf"
    category: "locomotion"
    canonical_id: "SC-08"
    note: "Full test requires sloped terrain in MJCF and a walking controller"
