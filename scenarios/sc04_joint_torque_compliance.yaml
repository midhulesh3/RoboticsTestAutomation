hrtf_version: "1.0"
scenario:
  name: "SC-04: Joint Torque Compliance"
  description: "No joint must exceed 95% of rated torque at any point during a 5s standing test"
  robot:
    model: "../models/simple_biped.urdf"
  simulator:
    backend: "mujoco"
    seed: 42
    step_size: 0.002
    real_time_factor: 0.0
  initial_conditions:
    pose:
      position: [0.0, 0.0, 1.0]
      orientation: [0.0, 0.0, 0.0, 1.0]
  disturbance: []
  duration: 5.0
  assertions:
    - type: "always_above"
      signal: "/com_height"
      value: 0.05
      window: [0.0, 5.0]
  metadata:
    author: "hrtf"
    category: "compliance"
    canonical_id: "SC-04"
    note: "Full torque limit assertions require actuated model with known effort limits"
