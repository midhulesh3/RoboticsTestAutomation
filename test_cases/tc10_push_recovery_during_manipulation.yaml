test_case:
  name: "TC-10: Push Recovery During Manipulation"
  description: "Robot maintains grasp during 30N lateral push; no fall; recovers stability within 5s"
  fixture: "simple_biped_standing"
  disturbance:
    - type: "impulse"
      time: 5.0
      force: [30.0, 0.0, 0.0]
      duration: 0.2
      link: "base_link"
  duration: 15.0
  assertions:
    - type: "always_above"
      signal: "/com_height"
      value: 0.05
      window: [0.0, 15.0]
    - type: "never_exceeds"
      signal: "/com_height"
      value: 3.0
      window: [0.0, 15.0]
  metadata:
    author: "hrtf"
    category: "manipulation"
    canonical_id: "SC-10"
    note: "Requires humanoid model with arms/gripper and grasp event + wrist force signals"
